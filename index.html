<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="logo.png">
  <title>Nirvana Client</title>
  <style>
    @font-face {
      font-family: 'CustomFont';
      src: url('font.otf') format('opentype');
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background-color: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'CustomFont', monospace;
      overflow: hidden;
    }

    /* Subtle grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 210, 0, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 210, 0, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, #0a0a0a 100%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      background: rgba(10, 10, 10, 0.85);
      border: 1px solid rgba(255, 210, 0, 0.2);
      border-radius: 6px;
      padding: 56px 72px;
      width: 520px;
      box-shadow:
        0 0 0 1px rgba(255, 210, 0, 0.05),
        0 0 40px rgba(255, 210, 0, 0.06),
        0 20px 60px rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .corner {
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: #FFD200;
      border-style: solid;
      opacity: 0.6;
      pointer-events: none;
    }
    .corner.tl {
      top: -1px; left: -1px;
      border-width: 2px 0 0 2px;
      border-radius: 4px 0 0 0;
    }
    .corner.br {
      bottom: -1px; right: -1px;
      border-width: 0 2px 2px 0;
      border-radius: 0 0 4px 0;
    }

    /* Remove pseudo-element corners now handled by spans */

    .logo-wrap {
      width: 110px;
      height: 110px;
      position: relative;
    }

    .logo-wrap::before {
      content: '';
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 210, 0, 0.15) 0%, transparent 70%);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.08); }
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 0 18px rgba(255, 210, 0, 0.4));
    }

    .text-block {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .typed-line {
      font-family: 'CustomFont', monospace;
      color: #FFD200;
      letter-spacing: 0.08em;
      text-shadow:
        0 0 20px rgba(255, 210, 0, 0.5),
        0 0 40px rgba(255, 210, 0, 0.2);
      white-space: nowrap;
      overflow: hidden;
    }

    .line-title {
      font-size: clamp(2rem, 5vw, 3.2rem);
      min-height: 1.2em;
    }

    .line-sub {
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      opacity: 0;
      letter-spacing: 0.25em;
      color: rgba(255, 210, 0, 0.75);
      text-shadow:
        0 0 12px rgba(255, 210, 0, 0.35);
    }

    /* Cursor blinking */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #FFD200;
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 0.8s step-end infinite;
      box-shadow: 0 0 8px rgba(255, 210, 0, 0.8);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .divider {
      width: 0px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #FFD200, transparent);
      opacity: 0;
      transition: width 0.8s ease, opacity 0.4s ease;
    }

    .divider.show {
      width: 220px;
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="corner tl"></span>
    <span class="corner br"></span>
    <div class="logo-wrap">
      <img src="logo.png" alt="Nirvana Client Logo">
    </div>

    <div class="text-block">
      <div class="typed-line line-title" id="line1"><span class="cursor"></span></div>
      <div class="divider" id="divider"></div>
      <div class="typed-line line-sub" id="line2"></div>
    </div>
  </div>

  <script>
    const line1El = document.getElementById('line1');
    const line2El = document.getElementById('line2');
    const divider = document.getElementById('divider');

    const TEXT1 = 'Nirvana Client';
    const TEXT2 = 'Coming Soon';
    const TYPE_SPEED = 80;
    const PAUSE_BETWEEN = 600;
    const PAUSE_AFTER_DOTS = 500;

    function sleep(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    async function typeLine(el, text, speed) {
      // Insert cursor
      el.innerHTML = '<span class="cursor"></span>';
      for (let i = 0; i < text.length; i++) {
        el.innerHTML = text.slice(0, i + 1) + '<span class="cursor"></span>';
        await sleep(speed + (Math.random() * 30 - 15));
      }
    }

    async function typeDots(el, text) {
      // Type dots one by one after the text
      for (let d = 0; d < 3; d++) {
        el.innerHTML = text + '.'.repeat(d + 1) + '<span class="cursor"></span>';
        await sleep(250);
      }
      await sleep(PAUSE_AFTER_DOTS);
    }

    async function run() {
      await sleep(400);

      // Type "Nirvana Client"
      await typeLine(line1El, TEXT1, TYPE_SPEED);
      await sleep(120);

      // Type the dots after it
      await typeDots(line1El, TEXT1);

      // Freeze cursor on line1, show divider
      line1El.innerHTML = TEXT1 + '<span style="opacity:0.3" class="cursor"></span>';
      divider.classList.add('show');
      await sleep(PAUSE_BETWEEN);

      // Show line2 and start typing
      line2El.style.opacity = '1';
      line2El.innerHTML = '<span class="cursor"></span>';
      await sleep(200);

      await typeLine(line2El, TEXT2, TYPE_SPEED + 20);
      await sleep(120);
      await typeDots(line2El, TEXT2);

      // Final state — leave cursor blinking on line2
      line2El.innerHTML = TEXT2 + '<span class="cursor"></span>';
      // Hide line1 cursor
      line1El.innerHTML = TEXT1;
    }

    run();
  </script>
</body>
</html>
